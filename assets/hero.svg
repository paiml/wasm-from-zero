<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="wasm-from-zero: Canvas2D · Elm cycle · components — built on aprender presentar, tested with probar">
<!-- GRID PROTOCOL MANIFEST
     Canvas: 1200x600 | text_elements: 0 | role: img
     Zone 1 (0..400):   canvas-grid      (Canvas2D rect draws + clip)
     Zone 2 (400..800): elm-cycle        (Event → State → Frame, in WASM)
     Zone 3 (800..1200): components      (browser window + composed panels)
     Bottom: aprender presentar + probar platform strip (amber)
     Stroke ≥ 4 | Fill-opacity 0.30–0.55 | Palette: oxide-premium
-->

<defs>
  <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#1a1d23"/>
  </linearGradient>
  <radialGradient id="zone-blue" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="zone-purple" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#9f8fef" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#9f8fef" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="zone-green" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#36b37e" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#36b37e" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="accent-rust" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#4a9eff"/>
    <stop offset="50%" stop-color="#9f8fef"/>
    <stop offset="100%" stop-color="#36b37e"/>
  </linearGradient>
  <linearGradient id="platform-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ffab00" stop-opacity="0.45"/>
    <stop offset="50%" stop-color="#ff9d1a" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#f38b00" stop-opacity="0.45"/>
  </linearGradient>
  <linearGradient id="canvas-rect" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#0056d2" stop-opacity="0.4"/>
  </linearGradient>
</defs>

<rect width="1200" height="600" fill="url(#bg-grad)"/>
<rect x="20" y="20" width="1160" height="560" fill="none" stroke="#30363d" stroke-width="2"/>

<ellipse cx="200" cy="280" rx="200" ry="220" fill="url(#zone-blue)"/>
<ellipse cx="600" cy="280" rx="200" ry="220" fill="url(#zone-purple)"/>
<ellipse cx="1000" cy="280" rx="200" ry="220" fill="url(#zone-green)"/>

<rect x="80" y="60" width="1040" height="6" rx="3" fill="url(#accent-rust)"/>

<line x1="400" y1="100" x2="400" y2="470" stroke="#30363d" stroke-width="2"/>
<line x1="800" y1="100" x2="800" y2="470" stroke="#30363d" stroke-width="2"/>

<circle cx="50" cy="50" r="10" fill="#4a9eff" fill-opacity="0.6"/>
<circle cx="1150" cy="50" r="10" fill="#36b37e" fill-opacity="0.6"/>
<circle cx="50" cy="550" r="10" fill="#ffab00" fill-opacity="0.7"/>
<circle cx="1150" cy="550" r="10" fill="#ff9d1a" fill-opacity="0.7"/>

<!-- ZONE 1: Canvas2D — a browser canvas frame with rect draws -->
<g id="zone-canvas">
  <!-- canvas frame -->
  <rect x="80" y="160" width="240" height="240" rx="6" fill="#0d1117" stroke="#4a9eff" stroke-width="5"/>
  <!-- title bar suggesting <canvas id="root"> -->
  <rect x="80" y="160" width="240" height="20" rx="6" fill="#4a9eff" fill-opacity="0.35"/>
  <!-- draw operations on the canvas -->
  <rect x="100" y="200" width="80" height="60" rx="4" fill="url(#canvas-rect)" stroke="#4a9eff" stroke-width="3"/>
  <rect x="210" y="200" width="90" height="40" rx="4" fill="#4a9eff" fill-opacity="0.30" stroke="#4a9eff" stroke-width="3"/>
  <rect x="100" y="280" width="120" height="50" rx="4" fill="#4a9eff" fill-opacity="0.45" stroke="#4a9eff" stroke-width="3"/>
  <rect x="240" y="260" width="60" height="100" rx="4" fill="#4a9eff" fill-opacity="0.25" stroke="#4a9eff" stroke-width="3"/>
  <rect x="100" y="350" width="200" height="30" rx="4" fill="#4a9eff" fill-opacity="0.55" stroke="#4a9eff" stroke-width="3"/>
  <!-- "clip past edge" indication: a rect that's been clipped at the right edge -->
  <line x1="316" y1="200" x2="316" y2="260" stroke="#a5d6ff" stroke-width="2" stroke-dasharray="4 4"/>
</g>

<!-- ZONE 2: Elm cycle in WASM — same shape, smaller for variety -->
<g id="zone-elm">
  <circle cx="500" cy="220" r="48" fill="#161b22" stroke="#9f8fef" stroke-width="5"/>
  <!-- Event icon: a cursor click -->
  <polygon points="488,205 488,232 498,222 506,234 514,228 506,216 516,216" fill="#9f8fef" fill-opacity="0.7"/>
  <circle cx="700" cy="220" r="48" fill="#161b22" stroke="#9f8fef" stroke-width="5"/>
  <!-- State icon: stack of squares -->
  <rect x="685" y="200" width="14" height="14" rx="2" fill="#9f8fef" fill-opacity="0.6"/>
  <rect x="703" y="200" width="14" height="14" rx="2" fill="#9f8fef" fill-opacity="0.6"/>
  <rect x="685" y="218" width="14" height="14" rx="2" fill="#9f8fef" fill-opacity="0.6"/>
  <rect x="703" y="218" width="14" height="14" rx="2" fill="#9f8fef" fill-opacity="0.6"/>
  <rect x="694" y="232" width="14" height="14" rx="2" fill="#9f8fef" fill-opacity="0.8"/>
  <!-- VDom icon: a tree -->
  <circle cx="600" cy="380" r="48" fill="#161b22" stroke="#9f8fef" stroke-width="5"/>
  <line x1="600" y1="360" x2="585" y2="380" stroke="#9f8fef" stroke-width="3"/>
  <line x1="600" y1="360" x2="615" y2="380" stroke="#9f8fef" stroke-width="3"/>
  <line x1="585" y1="380" x2="575" y2="400" stroke="#9f8fef" stroke-width="3"/>
  <line x1="585" y1="380" x2="595" y2="400" stroke="#9f8fef" stroke-width="3"/>
  <line x1="615" y1="380" x2="615" y2="400" stroke="#9f8fef" stroke-width="3"/>
  <circle cx="600" cy="360" r="4" fill="#9f8fef"/>
  <circle cx="585" cy="380" r="4" fill="#9f8fef"/>
  <circle cx="615" cy="380" r="4" fill="#9f8fef"/>
  <circle cx="575" cy="400" r="4" fill="#9f8fef"/>
  <circle cx="595" cy="400" r="4" fill="#9f8fef"/>
  <circle cx="615" cy="400" r="4" fill="#9f8fef"/>
  <!-- arrows -->
  <path d="M 548 220 L 645 220" stroke="#9f8fef" stroke-width="5" fill="none"/>
  <polygon points="640,212 660,220 640,228" fill="#9f8fef"/>
  <path d="M 678 260 L 632 338" stroke="#9f8fef" stroke-width="5" fill="none"/>
  <polygon points="640,324 624,354 654,340" fill="#9f8fef"/>
  <path d="M 552 360 L 510 270" stroke="#9f8fef" stroke-width="5" fill="none" stroke-dasharray="6 6"/>
  <polygon points="514,286 504,258 524,280" fill="#9f8fef"/>
</g>

<!-- ZONE 3: components — a browser window with composed panels -->
<g id="zone-components">
  <rect x="830" y="160" width="340" height="260" rx="8" fill="#161b22" stroke="#36b37e" stroke-width="5"/>
  <!-- title bar -->
  <rect x="830" y="160" width="340" height="24" rx="8" fill="#36b37e" fill-opacity="0.35"/>
  <circle cx="844" cy="172" r="4" fill="#ff5630" fill-opacity="0.9"/>
  <circle cx="858" cy="172" r="4" fill="#ffab00" fill-opacity="0.9"/>
  <circle cx="872" cy="172" r="4" fill="#36b37e" fill-opacity="0.9"/>
  <!-- URL bar -->
  <rect x="890" y="166" width="270" height="12" rx="3" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <!-- header strip -->
  <rect x="844" y="196" width="312" height="34" rx="4" fill="#0d1117" stroke="#36b37e" stroke-width="2.5"/>
  <rect x="850" y="202" width="80" height="22" rx="3" fill="#36b37e" fill-opacity="0.55"/>
  <rect x="940" y="202" width="120" height="22" rx="3" fill="#36b37e" fill-opacity="0.35"/>
  <rect x="1070" y="202" width="80" height="22" rx="3" fill="#36b37e" fill-opacity="0.55"/>
  <!-- main: chart on left, sidebar on right -->
  <rect x="844" y="240" width="200" height="170" rx="4" fill="#0d1117" stroke="#36b37e" stroke-width="2.5"/>
  <!-- chart curve -->
  <polyline points="850,400 870,380 890,386 910,360 930,366 950,346 970,352 990,340 1010,348 1030,336 1040,338"
            fill="none" stroke="#7ee787" stroke-width="3.5"/>
  <!-- bars under -->
  <rect x="855" y="280" width="12" height="60" fill="#36b37e" fill-opacity="0.4"/>
  <rect x="875" y="295" width="12" height="45" fill="#36b37e" fill-opacity="0.4"/>
  <rect x="895" y="270" width="12" height="70" fill="#36b37e" fill-opacity="0.4"/>
  <rect x="915" y="305" width="12" height="35" fill="#36b37e" fill-opacity="0.4"/>
  <!-- sidebar list -->
  <rect x="1052" y="240" width="104" height="170" rx="4" fill="#0d1117" stroke="#36b37e" stroke-width="2.5"/>
  <rect x="1060" y="250" width="88" height="3.5" fill="#7ee787" fill-opacity="0.6"/>
  <rect x="1060" y="262" width="64" height="3.5" fill="#36b37e" fill-opacity="0.5"/>
  <rect x="1060" y="278" width="74" height="3.5" fill="#7ee787" fill-opacity="0.6"/>
  <rect x="1060" y="290" width="56" height="3.5" fill="#36b37e" fill-opacity="0.5"/>
  <rect x="1060" y="306" width="80" height="3.5" fill="#7ee787" fill-opacity="0.6"/>
  <rect x="1060" y="318" width="50" height="3.5" fill="#36b37e" fill-opacity="0.5"/>
  <rect x="1060" y="334" width="78" height="3.5" fill="#7ee787" fill-opacity="0.6"/>
  <rect x="1060" y="346" width="60" height="3.5" fill="#36b37e" fill-opacity="0.5"/>
</g>

<!-- TRI-SYMBOL SEAL (Canvas / Elm / Compose) -->
<g id="seal">
  <circle cx="200" cy="500" r="22" fill="#0d1117" stroke="#4a9eff" stroke-width="4.5"/>
  <circle cx="600" cy="500" r="22" fill="#0d1117" stroke="#9f8fef" stroke-width="4.5"/>
  <circle cx="1000" cy="500" r="22" fill="#0d1117" stroke="#36b37e" stroke-width="4.5"/>
  <line x1="222" y1="500" x2="578" y2="500" stroke="url(#accent-rust)" stroke-width="3"/>
  <line x1="622" y1="500" x2="978" y2="500" stroke="url(#accent-rust)" stroke-width="3"/>
  <!-- inner glyphs -->
  <rect x="190" y="490" width="20" height="20" fill="#4a9eff" fill-opacity="0.55"/>
  <circle cx="600" cy="500" r="10" fill="#9f8fef" fill-opacity="0.55"/>
  <!-- "browser frame" mini-glyph for compose -->
  <rect x="989" y="491" width="22" height="18" rx="2" fill="none" stroke="#36b37e" stroke-width="3"/>
  <line x1="989" y1="498" x2="1011" y2="498" stroke="#36b37e" stroke-width="2"/>
</g>

<!-- APRENDER PRESENTAR + PROBAR PLATFORM STRIP -->
<g id="platform">
  <rect x="80" y="535" width="1040" height="36" rx="6" fill="#1a1d23" stroke="#ffab00" stroke-width="3"/>
  <rect x="80" y="535" width="1040" height="36" rx="6" fill="url(#platform-grad)"/>
  <!-- presentar icon -->
  <g transform="translate(120, 538)">
    <rect x="0" y="3" width="26" height="26" rx="3" fill="none" stroke="#0d1117" stroke-width="3"/>
    <rect x="3" y="6" width="20" height="6" fill="#0d1117"/>
    <rect x="3" y="14" width="20" height="6" fill="#0d1117"/>
    <rect x="3" y="22" width="20" height="6" fill="#0d1117"/>
  </g>
  <!-- divider dots -->
  <circle cx="380" cy="553" r="4" fill="#0d1117"/>
  <circle cx="600" cy="553" r="4" fill="#0d1117"/>
  <circle cx="820" cy="553" r="4" fill="#0d1117"/>
  <!-- probar icon -->
  <g transform="translate(1054, 538)">
    <rect x="0" y="3" width="22" height="22" rx="3" fill="#0d1117" fill-opacity="0.4" stroke="#0d1117" stroke-width="3"/>
    <rect x="10" y="13" width="22" height="22" rx="3" fill="#0d1117" fill-opacity="0.7" stroke="#0d1117" stroke-width="3"/>
    <polyline points="14,24 19,30 30,18" fill="none" stroke="#0d1117" stroke-width="4" stroke-linecap="round"/>
  </g>
</g>

</svg>
